<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecionando… | LEONARDO.DEV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<!-- Meta / OG para preview bonito no feed -->
<meta property="og:title" content="Leonardo.Dev — Web Design de Conversão">
<meta property="og:description" content="Clique para conversar no WhatsApp">
<meta name="theme-color" content="#0B0F1A">

<style>
:root {
  --bg:    #0B0F1A;
  --dark2: #141824;
  --dark3: #1C2235;
  --gold:  #FFC857;
  --cyan:  #00D1FF;
  --green: #25D366;
  --white: #F5F5F5;
  --glow-gold: 0 0 28px rgba(255,200,87,0.55);
  --glow-green: 0 0 28px rgba(37,211,102,0.5);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Montserrat', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

/* ── FUNDO ANIMADO ── */
.bg-orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(90px);
  pointer-events: none;
  opacity: 0;
  animation: orbIn 1.2s ease forwards;
}
.bg-orb.gold {
  width: 520px; height: 520px;
  background: radial-gradient(circle, rgba(255,200,87,0.12), transparent 70%);
  top: -120px; left: -80px;
  animation-delay: 0.2s;
}
.bg-orb.cyan {
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(0,209,255,0.09), transparent 70%);
  bottom: -100px; right: -60px;
  animation-delay: 0.4s;
}
.bg-orb.green {
  width: 340px; height: 340px;
  background: radial-gradient(circle, rgba(37,211,102,0.08), transparent 70%);
  bottom: 20%; left: 10%;
  animation-delay: 0.6s;
}

@keyframes orbIn {
  to { opacity: 1; }
}

/* Grade decorativa */
.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

/* ── CARD CENTRAL ── */
.card {
  position: relative;
  z-index: 10;
  background: var(--dark2);
  border: 1px solid rgba(255,200,87,0.15);
  border-radius: 20px;
  padding: 52px 48px 44px;
  max-width: 460px;
  width: calc(100% - 40px);
  text-align: center;
  box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  opacity: 0;
  transform: translateY(30px) scale(0.97);
  animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
}

@keyframes cardIn {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Linha superior dourada */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  border-radius: 0 0 2px 2px;
}

/* ── LOGO ── */
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 4px;
  color: var(--gold);
  text-shadow: var(--glow-gold);
  margin-bottom: 32px;
  opacity: 0;
  animation: fadeUp 0.5s ease 0.7s forwards;
}
.logo span { color: var(--cyan); }

/* ── ÍCONE WHATSAPP ── */
.wa-icon-wrap {
  position: relative;
  width: 80px;
  height: 80px;
  margin: 0 auto 28px;
  opacity: 0;
  animation: fadeUp 0.5s ease 0.85s forwards;
}

.wa-icon-wrap::before {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 2px solid rgba(37,211,102,0.25);
  animation: ringPulse 2s ease-in-out infinite 1.5s;
}

.wa-icon-wrap::after {
  content: '';
  position: absolute;
  inset: -20px;
  border-radius: 50%;
  border: 1px solid rgba(37,211,102,0.1);
  animation: ringPulse 2s ease-in-out infinite 1.8s;
}

@keyframes ringPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.08); opacity: 0.5; }
}

.wa-icon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--green);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--glow-green);
}

.wa-icon svg {
  width: 44px;
  height: 44px;
  fill: #fff;
}

/* ── TEXTO ── */
.headline {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.9rem;
  letter-spacing: 2px;
  line-height: 1.1;
  margin-bottom: 12px;
  opacity: 0;
  animation: fadeUp 0.5s ease 1s forwards;
}

.headline span { color: var(--gold); }

.subtitle {
  font-size: 0.82rem;
  color: rgba(255,255,255,0.45);
  line-height: 1.65;
  margin-bottom: 32px;
  opacity: 0;
  animation: fadeUp 0.5s ease 1.1s forwards;
}

/* ── BARRA DE PROGRESSO ── */
.progress-wrap {
  background: rgba(255,255,255,0.06);
  border-radius: 100px;
  height: 4px;
  overflow: hidden;
  margin-bottom: 10px;
  opacity: 0;
  animation: fadeUp 0.4s ease 1.2s forwards;
}

.progress-bar {
  height: 100%;
  width: 0%;
  border-radius: 100px;
  background: linear-gradient(90deg, var(--green), #00e676);
  animation: progressFill 3s cubic-bezier(0.4, 0, 0.2, 1) 1.5s forwards;
}

@keyframes progressFill {
  to { width: 100%; }
}

.progress-label {
  font-size: 0.62rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  margin-bottom: 28px;
  opacity: 0;
  animation: fadeUp 0.4s ease 1.25s forwards;
}

/* ── BOTÃO MANUAL ── */
.wa-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: var(--green);
  color: #fff;
  padding: 15px 36px;
  border-radius: 8px;
  font-weight: 900;
  font-size: 0.82rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-decoration: none;
  transition: all 0.25s;
  box-shadow: var(--glow-green);
  position: relative;
  overflow: hidden;
  opacity: 0;
  animation: fadeUp 0.5s ease 1.4s forwards;
  width: 100%;
}

.wa-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transform: translateX(-100%);
  transition: transform 0.5s;
}

.wa-btn:hover { box-shadow: 0 0 40px rgba(37,211,102,0.7); transform: translateY(-2px); }
.wa-btn:hover::before { transform: translateX(100%); }

.wa-btn svg {
  width: 18px; height: 18px;
  fill: #fff;
  flex-shrink: 0;
}

/* ── RODAPÉ DO CARD ── */
.card-footer {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.06);
  font-size: 0.62rem;
  letter-spacing: 1.5px;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
  opacity: 0;
  animation: fadeUp 0.4s ease 1.5s forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── PARTÍCULAS CANVAS ── */
canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.25;
  z-index: 1;
}
</style>
</head>
<body>

<div class="bg-orb gold"></div>
<div class="bg-orb cyan"></div>
<div class="bg-orb green"></div>
<div class="bg-grid"></div>
<canvas id="particles"></canvas>

<div class="card">
  <div class="logo">LEONARDO<span>.</span>DEV</div>

  <div class="wa-icon-wrap">
    <div class="wa-icon">
      <!-- Ícone oficial WhatsApp em SVG -->
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <path d="M16.003 2.667C8.637 2.667 2.667 8.637 2.667 16c0 2.37.627 4.594 1.72 6.52L2.667 29.333l6.98-1.686A13.3 13.3 0 0 0 16.003 29.333C23.367 29.333 29.333 23.363 29.333 16S23.367 2.667 16.003 2.667zm0 2.4c5.988 0 10.93 4.944 10.93 10.933s-4.942 10.933-10.93 10.933a10.88 10.88 0 0 1-5.557-1.524l-.397-.237-4.14 1.003.958-3.99-.26-.41A10.89 10.89 0 0 1 5.073 16c0-5.989 4.942-10.933 10.93-10.933zm-3.2 5.6c-.247 0-.648.093-.987.46-.338.368-1.293 1.264-1.293 3.082s1.323 3.574 1.508 3.82c.184.247 2.585 4.094 6.34 5.573 3.143 1.238 3.754.994 4.43.932.677-.062 2.183-.893 2.492-1.754.308-.862.308-1.6.216-1.754-.093-.154-.338-.247-.707-.43s-2.183-1.077-2.522-1.2c-.338-.122-.585-.183-.831.185-.247.368-.954 1.2-1.17 1.447-.215.247-.43.277-.8.093-.37-.184-1.56-.576-2.974-1.834-1.1-.98-1.842-2.19-2.058-2.558-.215-.368-.023-.567.162-.75.166-.165.37-.43.554-.646.185-.215.246-.369.37-.615.122-.246.062-.46-.031-.645-.093-.184-.83-2.003-1.138-2.74-.3-.72-.61-.622-.831-.634a15.5 15.5 0 0 0-.73-.017z"/>
      </svg>
    </div>
  </div>

  <h1 class="headline">Redirecionando para o<br><span>WhatsApp…</span></h1>

  <p class="subtitle">
    Você será redirecionado automaticamente.<br>
    Caso o WhatsApp não abra,
    <a id="manual-link" href="#" style="color:var(--gold);font-weight:700;text-decoration:none;">clique aqui</a>.
  </p>

  <div class="progress-wrap">
    <div class="progress-bar"></div>
  </div>
  <div class="progress-label">Abrindo conversa…</div>

  <a id="wa-btn" href="#" class="wa-btn" target="_blank" rel="noopener">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <path d="M16.003 2.667C8.637 2.667 2.667 8.637 2.667 16c0 2.37.627 4.594 1.72 6.52L2.667 29.333l6.98-1.686A13.3 13.3 0 0 0 16.003 29.333C23.367 29.333 29.333 23.363 29.333 16S23.367 2.667 16.003 2.667zm0 2.4c5.988 0 10.93 4.944 10.93 10.933s-4.942 10.933-10.93 10.933a10.88 10.88 0 0 1-5.557-1.524l-.397-.237-4.14 1.003.958-3.99-.26-.41A10.89 10.89 0 0 1 5.073 16c0-5.989 4.942-10.933 10.93-10.933zm-3.2 5.6c-.247 0-.648.093-.987.46-.338.368-1.293 1.264-1.293 3.082s1.323 3.574 1.508 3.82c.184.247 2.585 4.094 6.34 5.573 3.143 1.238 3.754.994 4.43.932.677-.062 2.183-.893 2.492-1.754.308-.862.308-1.6.216-1.754-.093-.154-.338-.247-.707-.43s-2.183-1.077-2.522-1.2c-.338-.122-.585-.183-.831.185-.247.368-.954 1.2-1.17 1.447-.215.247-.43.277-.8.093-.37-.184-1.56-.576-2.974-1.834-1.1-.98-1.842-2.19-2.058-2.558-.215-.368-.023-.567.162-.75.166-.165.37-.43.554-.646.185-.215.246-.369.37-.615.122-.246.062-.46-.031-.645-.093-.184-.83-2.003-1.138-2.74-.3-.72-.61-.622-.831-.634a15.5 15.5 0 0 0-.73-.017z"/>
    </svg>
    Abrir WhatsApp agora
  </a>

  <div class="card-footer">Leonardo.Dev &nbsp;·&nbsp; Web Design de Conversão</div>
</div>

<script>
  // ── CONFIGURAÇÃO ──────────────────────────────────────────
  const PHONE   = '5567991531530';
  const MESSAGE = 'Olá. Vi seu anúncio e quero mais informações sobre o serviço de tráfego pago';
  const DELAY_MS = 3000; // tempo antes de redirecionar automaticamente
  // ─────────────────────────────────────────────────────────

  const waUrl = `https://wa.me/${PHONE}?text=${encodeURIComponent(MESSAGE)}`;

  // Seta os hrefs
  document.getElementById('wa-btn').href = waUrl;
  document.getElementById('manual-link').href = waUrl;

  // Redireciona automaticamente após DELAY_MS
  setTimeout(() => {
    window.location.href = waUrl;
  }, DELAY_MS);

  // ── PARTÍCULAS ───────────────────────────────────────────
  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const pts = Array.from({ length: 50 }, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 1.4 + 0.4,
    dx: (Math.random() - 0.5) * 0.35,
    dy: (Math.random() - 0.5) * 0.35,
    c: Math.random() > 0.55 ? '#FFC857' : Math.random() > 0.5 ? '#00D1FF' : '#25D366',
    o: Math.random() * 0.4 + 0.15,
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pts.forEach(p => {
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0 || p.x > canvas.width)  p.dx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.c;
      ctx.globalAlpha = p.o;
      ctx.fill();
    });
    pts.forEach((a, i) => {
      pts.slice(i + 1).forEach(b => {
        const d = Math.hypot(a.x - b.x, a.y - b.y);
        if (d < 110) {
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = '#25D366';
          ctx.globalAlpha = (1 - d / 110) * 0.08;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      });
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  draw();
</script>
</body>
</html>
